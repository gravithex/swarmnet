services:

  # axl-base exists only to build the axl:latest image.
  # Run `docker compose build axl-base` once, or use `docker compose up --build`.
  axl-base:
    build:
      context: .
      dockerfile: axl.Dockerfile
    image: axl:latest
    entrypoint: ["/bin/true"]

  # ── AXL nodes ────────────────────────────────────────────────────────────────
  # Each node gets its own private key (→ unique peer ID) and its own config.
  # Keys are generated by scripts/setup-axl.sh and must exist before `up`.
  axl-planner:
    image: axl:latest
    ports:
      - "8081:9002"
    volumes:
      - ./configs/planner.json:/app/axl-config.json:ro
      - ./keys/planner.pem:/app/keys/planner.pem:ro
    networks:
      - swarmnet
    depends_on:
      axl-base:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/topology || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  axl-researcher:
    image: axl:latest
    ports:
      - "8082:9002"
    volumes:
      - ./configs/researcher.json:/app/axl-config.json:ro
      - ./keys/researcher.pem:/app/keys/researcher.pem:ro
    networks:
      - swarmnet
    depends_on:
      axl-base:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/topology || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  axl-critic:
    image: axl:latest
    ports:
      - "8083:9002"
    volumes:
      - ./configs/critic.json:/app/axl-config.json:ro
      - ./keys/critic.pem:/app/keys/critic.pem:ro
    networks:
      - swarmnet
    depends_on:
      axl-base:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/topology || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  axl-executor:
    image: axl:latest
    ports:
      - "8084:9002"
    volumes:
      - ./configs/executor.json:/app/axl-config.json:ro
      - ./keys/executor.pem:/app/keys/executor.pem:ro
    networks:
      - swarmnet
    depends_on:
      axl-base:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/topology || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── Agent services ────────────────────────────────────────────────────────────
  agent-planner:
    build:
      context: .
      dockerfile: packages/agent-planner/Dockerfile
    env_file: .env
    environment:
      AXL_NODE_URL: http://axl-planner:9002
      PLANNER_PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      axl-planner:
        condition: service_healthy
    networks:
      - swarmnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  agent-researcher:
    build:
      context: .
      dockerfile: packages/agent-researcher/Dockerfile
    env_file: .env
    environment:
      AXL_NODE_URL: http://axl-researcher:9002
      HEALTH_PORT: "3002"
    depends_on:
      axl-researcher:
        condition: service_healthy
    networks:
      - swarmnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  agent-critic:
    build:
      context: .
      dockerfile: packages/agent-critic/Dockerfile
    env_file: .env
    environment:
      AXL_NODE_URL: http://axl-critic:9002
      HEALTH_PORT: "3003"
    depends_on:
      axl-critic:
        condition: service_healthy
    networks:
      - swarmnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  agent-executor:
    build:
      context: .
      dockerfile: packages/agent-executor/Dockerfile
    env_file: .env
    environment:
      AXL_NODE_URL: http://axl-executor:9002
      HEALTH_PORT: "3004"
    depends_on:
      axl-executor:
        condition: service_healthy
    networks:
      - swarmnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  swarmnet:
    driver: bridge
